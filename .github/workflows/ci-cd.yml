name: CI/CD Pipeline - Clinica Web (Java + React + Render)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========================================
  # JOB 1: BUILD E VERIFICAÇÃO DO BACKEND (Java/Spring Boot)
  # ========================================
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Compilar e Empacotar
        run: mvn clean package -DskipTests -B

  # ========================================
  # JOB 2: TESTES E BUILD DO FRONTEND (React)
  # ========================================
  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 📦 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🏗️ Build de produção
        run: npm run build

  # ========================================
  # JOB 3: ACEITAÇÃO LOCAL ANTES DO RENDER
  # O Render publica automaticamente após os checks passarem.
  # ========================================
  acceptance:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐳 Build das imagens Docker
        run: docker compose build

      - name: ✅ Testes de aceitação (Docker Compose + HTTP)
        run: |
          docker compose up -d
          echo "Aguardando 30s para o Spring Boot subir completamente..."
          sleep 30
          curl -f http://localhost:8080/api/pacientes
          curl -f http://localhost:3000
          echo "✅ Testes de aceitação passaram; Render fará o deploy automático se estiver configurado."
      - name: 🧹 Encerrar containers
        if: always()
        run: docker compose down -v
